<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#0b1220"/><rect x="0" y="0" width="1200" height="6" fill="#4ade80"/><text x="48" y="58" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="3" style="">THE BUG IT CAUGHT</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#e6edf6" font-weight="700" text-anchor="start" style="">The gate wrote its own reproduction</text><text x="48" y="132" font-family="Helvetica, Arial, sans-serif" font-size="16.5" fill="#93a1b5" font-weight="400" text-anchor="start" style="">I deleted one guard — the check that two approvers must be distinct people. Then I asked the gate.</text><rect x="48" y="200" width="168" height="58" rx="10" fill="#131c30" stroke="#26344a" stroke-width="2"/><text x="132.0" y="235" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15.5" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">submit(Alice)</text><rect x="238" y="200" width="168" height="58" rx="10" fill="#131c30" stroke="#26344a" stroke-width="2"/><text x="322.0" y="235" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15.5" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">approve(Bob)</text><line x1="218" y1="229" x2="234" y2="229" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="234,229 225,224 225,234" fill="#93a1b5"/><rect x="428" y="200" width="168" height="58" rx="10" fill="#131c30" stroke="#fbbf24" stroke-width="2"/><text x="512.0" y="235" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15.5" fill="#fbbf24" font-weight="700" text-anchor="middle" style="">approve(Bob)</text><text x="512.0" y="186" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12.5" fill="#fbbf24" font-weight="400" text-anchor="middle" style="">(redelivered)</text><line x1="408" y1="229" x2="424" y2="229" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="424,229 415,224 415,234" fill="#93a1b5"/><rect x="618" y="200" width="150" height="58" rx="10" fill="#131c30" stroke="#38bdf8" stroke-width="2"/><text x="693.0" y="235" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15.5" fill="#38bdf8" font-weight="700" text-anchor="middle" style="">APPROVED</text><line x1="598" y1="229" x2="614" y2="229" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="614,229 605,224 605,234" fill="#93a1b5"/><rect x="790" y="200" width="150" height="58" rx="10" fill="#131c30" stroke="#f87171" stroke-width="2"/><text x="865.0" y="235" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15.5" fill="#f87171" font-weight="700" text-anchor="middle" style="">execute()</text><line x1="770" y1="229" x2="786" y2="229" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="786,229 777,224 777,234" fill="#93a1b5"/><text x="693.0" y="292" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="13.5" fill="#f87171" font-weight="700" text-anchor="middle" style="">distinct approvers = 1</text><line x1="693.0" y1="262" x2="693.0" y2="276" stroke="#f87171" stroke-width="1.4" stroke-linecap="round"/><rect x="48" y="350" width="1104" height="92" rx="14" fill="#1c1013" stroke="#f87171" stroke-width="2"/><text x="74" y="390" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#f87171" font-weight="800" text-anchor="start" style="">✗  S1 VIOLATED — two-person integrity</text><text x="74" y="420" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#e6edf6" font-weight="400" text-anchor="start" style="">One human, counted twice, drove the order all the way to execute().</text><rect x="48" y="470" width="1104" height="186" rx="14" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="74" y="514" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#4ade80" font-weight="700" text-anchor="start" style="">This 4-step path was generated by the gate — not by me.</text><text x="74" y="552" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#93a1b5" font-weight="400" text-anchor="start" style="">I didn't write the test. The gate explored the reachable states, found the hole,</text><text x="74" y="576" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#93a1b5" font-weight="400" text-anchor="start" style="">and handed back the shortest sequence that reaches it.</text><text x="74" y="616" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15.5" fill="#e6edf6" font-weight="400" text-anchor="start" style="">Point the same check at the clean build</text><text x="504" y="616" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15.5" fill="#4ade80" font-weight="700" text-anchor="start" style="">→  it passes.  ✓</text><text x="48" y="734" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12" fill="#93a1b5" font-weight="700" text-anchor="start" letter-spacing="2" style="">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="734" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#93a1b5" font-weight="400" text-anchor="end" style="font-style:italic">verify, don't review</text></svg>