<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#0b1220"/><rect x="0" y="0" width="1200" height="6" fill="#4ade80"/><text x="48" y="58" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="3" style="">WHAT GETS CHECKED</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#e6edf6" font-weight="700" text-anchor="start" style="">The machine, and the five things it must never do</text><rect x="48" y="150" width="142" height="50" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="119.0" y="181" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">DRAFT</text><rect x="207" y="150" width="142" height="50" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="278.0" y="181" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">PENDING</text><line x1="188" y1="175.0" x2="203" y2="175.0" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="203,175.0 194,170.0 194,180.0" fill="#93a1b5"/><rect x="366" y="150" width="142" height="50" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="437.0" y="181" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">APPROVED</text><line x1="347" y1="175.0" x2="362" y2="175.0" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="362,175.0 353,170.0 353,180.0" fill="#93a1b5"/><rect x="525" y="150" width="142" height="50" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="596.0" y="181" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">RELEASED</text><line x1="506" y1="175.0" x2="521" y2="175.0" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="521,175.0 512,170.0 512,180.0" fill="#93a1b5"/><rect x="684" y="150" width="142" height="50" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="755.0" y="181" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">ACK'D</text><line x1="665" y1="175.0" x2="680" y2="175.0" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="680,175.0 671,170.0 671,180.0" fill="#93a1b5"/><rect x="843" y="150" width="142" height="50" rx="10" fill="#131c30" stroke="#4ade80" stroke-width="1.5"/><text x="914.0" y="181" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="middle" style="">EXECUTED</text><line x1="824" y1="175.0" x2="839" y2="175.0" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="839,175.0 830,170.0 830,180.0" fill="#93a1b5"/><rect x="1002" y="150" width="142" height="50" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="1073.0" y="181" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#e6edf6" font-weight="700" text-anchor="middle" style="">CLOSED</text><line x1="983" y1="175.0" x2="998" y2="175.0" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="998,175.0 989,170.0 989,180.0" fill="#93a1b5"/><text x="278.0" y="132" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12.5" fill="#38bdf8" font-weight="400" text-anchor="middle" style="">approve ×2 (distinct ≠ proposer)</text><line x1="278.0" y1="138" x2="278.0" y2="148" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round"/><text x="587.0" y="226" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12.5" fill="#818cf8" font-weight="400" text-anchor="middle" style="">transmit ×1</text><text x="914.0" y="226" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12.5" fill="#4ade80" font-weight="400" text-anchor="middle" style="">execute ×1 · in-window</text><line x1="914.0" y1="202" x2="914.0" y2="214" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round"/><line x1="587.0" y1="202" x2="587.0" y2="214" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/><rect x="208.0" y="270" width="140" height="44" rx="10" fill="#0f172a" stroke="#26344a" stroke-width="1.5" stroke-dasharray="4 4"/><text x="278.0" y="298" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="middle" style="">ABORTED</text><line x1="278.0" y1="240" x2="278.0" y2="266" stroke="#26344a" stroke-width="1.8" stroke-linecap="round"/><polygon points="278.0,266 269.0,261 269.0,271" fill="#26344a"/><rect x="367.0" y="270" width="140" height="44" rx="10" fill="#0f172a" stroke="#26344a" stroke-width="1.5" stroke-dasharray="4 4"/><text x="437.0" y="298" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="middle" style="">EXPIRED</text><line x1="437.0" y1="240" x2="437.0" y2="266" stroke="#26344a" stroke-width="1.8" stroke-linecap="round"/><polygon points="437.0,266 428.0,261 428.0,271" fill="#26344a"/><text x="183.0" y="340" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#93a1b5" font-weight="400" text-anchor="start" style="">recall stays reachable until execution · expiry ends a stalled order</text><rect x="48" y="370" width="1104" height="232" rx="16" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="74" y="410" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="2" style="">THE FIVE MUST-NEVERS</text><text x="1126" y="410" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#93a1b5" font-weight="400" text-anchor="end" style="font-style:italic">you declare these once, in ordinary code — no math</text><text x="74" y="452" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="start" style="">S1</text><text x="116" y="452" font-family="Helvetica, Arial, sans-serif" font-size="16.5" fill="#e6edf6" font-weight="400" text-anchor="start" style="">Never execute without two distinct approvers (neither the proposer)</text><text x="74" y="483" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="start" style="">S2</text><text x="116" y="483" font-family="Helvetica, Arial, sans-serif" font-size="16.5" fill="#e6edf6" font-weight="400" text-anchor="start" style="">Never execute outside the authorized time window</text><text x="74" y="514" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="start" style="">S3</text><text x="116" y="514" font-family="Helvetica, Arial, sans-serif" font-size="16.5" fill="#e6edf6" font-weight="400" text-anchor="start" style="">Never execute twice — exactly once, even after a crash or a retry</text><text x="74" y="545" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="start" style="">S4</text><text x="116" y="545" font-family="Helvetica, Arial, sans-serif" font-size="16.5" fill="#e6edf6" font-weight="400" text-anchor="start" style="">Never lose an order once it has been acknowledged</text><text x="74" y="576" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="start" style="">S5</text><text x="116" y="576" font-family="Helvetica, Arial, sans-serif" font-size="16.5" fill="#e6edf6" font-weight="400" text-anchor="start" style="">Never manufacture authorization by looping back through the graph</text><text x="48" y="734" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12" fill="#93a1b5" font-weight="700" text-anchor="start" letter-spacing="2" style="">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="734" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#93a1b5" font-weight="400" text-anchor="end" style="font-style:italic">verify, don't review</text></svg>