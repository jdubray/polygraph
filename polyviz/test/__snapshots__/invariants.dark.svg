<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="638" viewBox="0 0 1200 638"><rect width="1200" height="638" fill="#0b1220"/><rect x="0" y="0" width="1200" height="6" fill="#4ade80"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="3">WHAT GETS CHECKED</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#e6edf6" font-weight="700" text-anchor="start">The machine, and the five things it must never do</text><text x="48" y="608" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#93a1b5" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="608" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#93a1b5" font-style="italic" text-anchor="end">verify, don&#39;t review</text><rect x="48" y="130" width="1104" height="438" rx="12" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="84" y="168" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="2">5 MUST-NEVERS · 2 LIVENESS</text><text x="84" y="216" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S1</text><text x="140" y="216" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never execute without two distinct approvers (neither the proposer)</text><text x="84" y="266" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S2</text><text x="140" y="266" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never execute outside the authorized time window</text><text x="84" y="316" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S3</text><text x="140" y="316" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never execute twice — exactly once, even after a crash or a retry</text><text x="84" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S4</text><text x="140" y="366" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never lose an order once it has been acknowledged</text><text x="84" y="416" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S5</text><text x="140" y="416" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never manufacture authorization by looping back through the graph</text><text x="84" y="466" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#818cf8" font-weight="700" text-anchor="start">L1</text><text x="140" y="466" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Recall stays reachable until execution</text><text x="84" y="516" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#818cf8" font-weight="700" text-anchor="start">L2</text><text x="140" y="516" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Every order eventually reaches a terminal state</text></svg>