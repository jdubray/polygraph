<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="837" viewBox="0 0 1200 837"><rect width="1200" height="837" fill="#ffffff"/><rect x="0" y="0" width="1200" height="6" fill="#15803d"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#15803d" font-weight="700" text-anchor="start" letter-spacing="3">WHAT GETS CHECKED</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#0b1220" font-weight="700" text-anchor="start">The machine, and the five things it must never do</text><text x="48" y="807" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#5b6b82" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="807" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5b6b82" font-style="italic" text-anchor="end">verify, don&#39;t review</text><g transform="translate(48 150) scale(0.8389)"><path d="M152 55 L204 55" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="204,55 195,60.4 195,49.6" fill="#5b6b82"></polygon><path d="M344 41 L396 41" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="396,41 387,46.4 387,35.6" fill="#5b6b82"></polygon><path d="M536 41 L588 41" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="588,41 579,46.4 579,35.6" fill="#5b6b82"></polygon><path d="M728 41 L780 41" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="780,41 771,46.4 771,35.6" fill="#5b6b82"></polygon><path d="M920 41 L972 41" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="972,41 963,46.4 963,35.6" fill="#5b6b82"></polygon><path d="M1112 41 L1164 41" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="1164,41 1155,46.4 1155,35.6" fill="#5b6b82"></polygon><path d="M344 55 L374 55 L374 133 L396 133" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="396,133 387,138.4 387,127.6" fill="#5b6b82"></polygon><path d="M344 70 L364 70 L364 225 L396 225" fill="none" stroke="#5b6b82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polygon points="396,225 387,230.4 387,219.6" fill="#5b6b82"></polygon><rect x="12" y="26" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="82" y="60.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">DRAFT</text><rect x="204" y="26" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="274" y="60.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">PENDING</text><rect x="396" y="12" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="466" y="46.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">APPROVED</text><rect x="588" y="12" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="658" y="46.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">RELEASED</text><rect x="780" y="12" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="850" y="46.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">ACK&#39;D</text><rect x="972" y="12" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#15803d" stroke-width="2"/><text x="1042" y="46.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#15803d" font-weight="700" text-anchor="middle">EXECUTED</text><rect x="1164" y="12" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="1234" y="46.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">CLOSED</text><rect x="396" y="104" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2" stroke-dasharray="5 4"/><text x="466" y="138.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#5b6b82" font-weight="700" text-anchor="middle">ABORTED</text><rect x="396" y="196" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2" stroke-dasharray="5 4"/><text x="466" y="230.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#5b6b82" font-weight="700" text-anchor="middle">EXPIRED</text><line x1="370" y1="4" x2="370" y2="12" stroke="#0284c7" stroke-width="1.4" stroke-linecap="round"/><text x="370" y="-2" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#0284c7" font-weight="700" text-anchor="middle">approve ×2 (distinct ≠ proposer)</text><line x1="562" y1="4" x2="562" y2="12" stroke="#0284c7" stroke-width="1.4" stroke-linecap="round"/><text x="562" y="-2" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#0284c7" font-weight="700" text-anchor="middle">transmit ×1</text><line x1="946" y1="4" x2="946" y2="12" stroke="#15803d" stroke-width="1.4" stroke-linecap="round"/><text x="946" y="-2" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#15803d" font-weight="700" text-anchor="middle">execute ×1 · in-window</text></g><text x="48" y="403" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5b6b82" font-weight="400" text-anchor="start">recall stays reachable until execution  ·  every order eventually reaches a terminal state</text><rect x="48" y="429" width="1104" height="338" rx="12" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="1.5"/><text x="84" y="467" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15" fill="#15803d" font-weight="700" text-anchor="start" letter-spacing="2">5 MUST-NEVERS</text><text x="84" y="515" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#15803d" font-weight="700" text-anchor="start">S1</text><text x="140" y="515" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#0b1220" font-weight="400" text-anchor="start">Never execute without two distinct approvers (neither the proposer)</text><text x="84" y="565" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#15803d" font-weight="700" text-anchor="start">S2</text><text x="140" y="565" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#0b1220" font-weight="400" text-anchor="start">Never execute outside the authorized time window</text><text x="84" y="615" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#15803d" font-weight="700" text-anchor="start">S3</text><text x="140" y="615" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#0b1220" font-weight="400" text-anchor="start">Never execute twice — exactly once, even after a crash or a retry</text><text x="84" y="665" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#15803d" font-weight="700" text-anchor="start">S4</text><text x="140" y="665" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#0b1220" font-weight="400" text-anchor="start">Never lose an order once it has been acknowledged</text><text x="84" y="715" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#15803d" font-weight="700" text-anchor="start">S5</text><text x="140" y="715" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#0b1220" font-weight="400" text-anchor="start">Never manufacture authorization by looping back through the graph</text></svg>