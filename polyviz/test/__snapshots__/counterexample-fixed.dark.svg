<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="741" viewBox="0 0 1200 741"><rect width="1200" height="741" fill="#0b1220"/><rect x="0" y="0" width="1200" height="6" fill="#4ade80"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="3">THE FIX, VERIFIED</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#e6edf6" font-weight="700" text-anchor="start">Guard restored — the same check now passes</text><text x="48" y="128" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#93a1b5" font-weight="400" text-anchor="start">I put the distinct-approvers guard back. The gate re-explored every reachable state and could not reach execute() with one approver.</text><text x="48" y="711" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#93a1b5" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="711" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#93a1b5" font-style="italic" text-anchor="end">verify, don&#39;t review</text><rect x="48" y="204" width="173" height="58" rx="10" fill="#131c30" stroke="#26344a" stroke-width="2"/><text x="134.5" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#e6edf6" font-weight="700" text-anchor="middle">submit(Alice)</text><line x1="223" y1="233" x2="239" y2="233" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="239,233 230,228 230,238" fill="#93a1b5"></polygon><rect x="243" y="204" width="164" height="58" rx="10" fill="#131c30" stroke="#26344a" stroke-width="2"/><text x="325" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#e6edf6" font-weight="700" text-anchor="middle">approve(Bob)</text><line x1="409" y1="233" x2="425" y2="233" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="425,233 416,228 416,238" fill="#93a1b5"></polygon><rect x="429" y="204" width="189" height="58" rx="10" fill="#131c30" stroke="#fbbf24" stroke-width="2"/><text x="523.5" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#fbbf24" font-weight="700" text-anchor="middle">approve(Bob)</text><text x="523.5" y="190" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="12.5" fill="#fbbf24" font-weight="400" text-anchor="middle">(redelivered — ignored)</text><line x1="620" y1="233" x2="636" y2="233" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="636,233 627,228 627,238" fill="#93a1b5"></polygon><rect x="640" y="204" width="276" height="58" rx="10" fill="#131c30" stroke="#38bdf8" stroke-width="2"/><text x="778" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#38bdf8" font-weight="700" text-anchor="middle">PENDING</text><line x1="778" y1="266" x2="778" y2="280" stroke="#f87171" stroke-width="1.4" stroke-linecap="round"/><text x="778" y="296" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13.5" fill="#f87171" font-weight="700" text-anchor="middle">distinct approvers = 1 · blocked</text><rect x="48" y="358" width="1104" height="103" rx="14" fill="#0f1b14" stroke="#4ade80" stroke-width="2"/><text x="74" y="400" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#4ade80" font-weight="800" text-anchor="start">✓ CHECK PASSES — no reachable violation</text><text x="74" y="433" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#e6edf6" font-weight="400" text-anchor="start">The gate explored every reachable state from this trace and found no path to a violated invariant.</text><rect x="48" y="489" width="1104" height="182" rx="14" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="74" y="533" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#4ade80" font-weight="700" text-anchor="start">No reachable path drives this order to execute().</text><text x="74" y="571" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#93a1b5" font-weight="400" text-anchor="start">The redelivered approval is de-duplicated by principal, so the second approve(Bob) does not advance the order. execute() stays unreachable until a</text><text x="74" y="595" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#93a1b5" font-weight="400" text-anchor="start">second distinct approver acts.</text><text x="74" y="635" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#e6edf6" font-weight="400" text-anchor="start">Point the same check at the clean build</text><text x="466.7" y="635" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#4ade80" font-weight="700" text-anchor="start">→  it passes.  ✓</text></svg>