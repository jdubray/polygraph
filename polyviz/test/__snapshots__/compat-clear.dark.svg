<svg xmlns="http://www.w3.org/2000/svg" width="760" height="789" viewBox="0 0 760 789"><rect width="760" height="789" fill="#0b1220"/><rect x="0" y="0" width="760" height="6" fill="#4ade80"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="3">THE HARD PART, CLEARED</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#e6edf6" font-weight="700" text-anchor="start">The migration closed the gap</text><text x="48" y="128" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#93a1b5" font-weight="400" text-anchor="start">Every live order was migrated to satisfy the 3-approver rule before v2 ships. No reachable</text><text x="48" y="158" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#93a1b5" font-weight="400" text-anchor="start">state violates the new invariant.</text><text x="48" y="759" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#93a1b5" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="712" y="759" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#93a1b5" font-style="italic" text-anchor="end">verify, don&#39;t review</text><rect x="48" y="212" width="300" height="64" rx="12" fill="#131c30" stroke="#26344a" stroke-width="1.8"/><text x="72" y="242" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#26344a" font-weight="700" text-anchor="start">RULE v1</text><text x="72" y="264" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#e6edf6" font-weight="700" text-anchor="start">2 approvers</text><line x1="360" y1="244" x2="400" y2="244" stroke="#93a1b5" stroke-width="2.4" stroke-linecap="round"/><polygon points="400,244 391,249.4 391,238.6" fill="#93a1b5"></polygon><rect x="412" y="212" width="300" height="64" rx="12" fill="#131c30" stroke="#818cf8" stroke-width="1.8"/><text x="436" y="242" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#818cf8" font-weight="700" text-anchor="start">RULE v2  (deploy)</text><text x="436" y="264" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#e6edf6" font-weight="700" text-anchor="start">3 approvers</text><rect x="48" y="316" width="664" height="150" rx="14" fill="#0f172a" stroke="#26344a" stroke-width="1.5"/><text x="74" y="350" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#38bdf8" font-weight="700" text-anchor="start" letter-spacing="1">LIVE FLEET — orders already in flight</text><rect x="74" y="370" width="192" height="72" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="90" y="396" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="start">#o1</text><text x="136" y="396" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="start">EXECUTED</text><text x="90" y="422" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#93a1b5" font-weight="400" text-anchor="start">done</text><rect x="284" y="370" width="192" height="72" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="300" y="396" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="start">#o2</text><text x="346" y="396" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="start">APPROVED</text><text x="300" y="422" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#93a1b5" font-weight="400" text-anchor="start">re-approved under v2</text><rect x="494" y="370" width="192" height="72" rx="10" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="510" y="396" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="start">#o3</text><text x="556" y="396" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#93a1b5" font-weight="700" text-anchor="start">PENDING</text><text x="510" y="422" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#93a1b5" font-weight="400" text-anchor="start">1 approval</text><line x1="380" y1="466" x2="380" y2="496" stroke="#26344a" stroke-width="2" stroke-linecap="round"/><polygon points="380,496 374.6,487 385.4,487" fill="#26344a"></polygon><rect x="48" y="500" width="664" height="60" rx="12" fill="#131c30" stroke="#818cf8" stroke-width="1.8"/><text x="380" y="536" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="16" fill="#818cf8" font-weight="700" text-anchor="middle">polyvers · seed the check with the live states</text><rect x="48" y="592" width="664" height="127" rx="14" fill="#0f1b14" stroke="#4ade80" stroke-width="2"/><text x="74" y="634" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#4ade80" font-weight="800" text-anchor="start">✓ SAFE TO DEPLOY</text><text x="74" y="667" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#e6edf6" font-weight="400" text-anchor="start">No live order can be driven to execute() with fewer than three distinct approvers under</text><text x="74" y="691" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#e6edf6" font-weight="400" text-anchor="start">v2. The seeded model check found no counterexample.</text></svg>