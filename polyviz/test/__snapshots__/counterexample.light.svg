<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="717" viewBox="0 0 1200 717"><rect width="1200" height="717" fill="#ffffff"/><rect x="0" y="0" width="1200" height="6" fill="#15803d"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#15803d" font-weight="700" text-anchor="start" letter-spacing="3">THE BUG IT CAUGHT</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#0b1220" font-weight="700" text-anchor="start">The gate wrote its own reproduction</text><text x="48" y="128" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#5b6b82" font-weight="400" text-anchor="start">I deleted one guard — the check that two approvers must be distinct people. Then I asked the gate.</text><text x="48" y="687" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#5b6b82" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="687" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5b6b82" font-style="italic" text-anchor="end">verify, don&#39;t review</text><rect x="48" y="204" width="173" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="134.5" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">submit(Alice)</text><line x1="223" y1="233" x2="239" y2="233" stroke="#5b6b82" stroke-width="2.2" stroke-linecap="round"/><polygon points="239,233 230,228 230,238" fill="#5b6b82"></polygon><rect x="243" y="204" width="164" height="58" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="2"/><text x="325" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="700" text-anchor="middle">approve(Bob)</text><line x1="409" y1="233" x2="425" y2="233" stroke="#5b6b82" stroke-width="2.2" stroke-linecap="round"/><polygon points="425,233 416,228 416,238" fill="#5b6b82"></polygon><rect x="429" y="204" width="164" height="58" rx="10" fill="#f4f6fb" stroke="#b45309" stroke-width="2"/><text x="511" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#b45309" font-weight="700" text-anchor="middle">approve(Bob)</text><text x="511" y="190" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="12.5" fill="#b45309" font-weight="400" text-anchor="middle">(redelivered)</text><line x1="595" y1="233" x2="611" y2="233" stroke="#5b6b82" stroke-width="2.2" stroke-linecap="round"/><polygon points="611,233 602,228 602,238" fill="#5b6b82"></polygon><rect x="615" y="204" width="195" height="58" rx="10" fill="#f4f6fb" stroke="#0284c7" stroke-width="2"/><text x="712.5" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0284c7" font-weight="700" text-anchor="middle">APPROVED</text><line x1="712.5" y1="266" x2="712.5" y2="280" stroke="#dc2626" stroke-width="1.4" stroke-linecap="round"/><text x="712.5" y="296" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13.5" fill="#dc2626" font-weight="700" text-anchor="middle">distinct approvers = 1</text><line x1="812" y1="233" x2="828" y2="233" stroke="#5b6b82" stroke-width="2.2" stroke-linecap="round"/><polygon points="828,233 819,228 819,238" fill="#5b6b82"></polygon><rect x="832" y="204" width="140" height="58" rx="10" fill="#f4f6fb" stroke="#dc2626" stroke-width="2"/><text x="902" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#dc2626" font-weight="700" text-anchor="middle">execute()</text><rect x="48" y="358" width="1104" height="103" rx="14" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="74" y="400" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#dc2626" font-weight="800" text-anchor="start">✗ S1 VIOLATED — two-person integrity</text><text x="74" y="433" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#0b1220" font-weight="400" text-anchor="start">One human, counted twice, drove the order all the way to execute().</text><rect x="48" y="489" width="1104" height="158" rx="14" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="1.5"/><text x="74" y="533" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#15803d" font-weight="700" text-anchor="start">This 4-step path was generated by the gate — not by me.</text><text x="74" y="571" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#5b6b82" font-weight="400" text-anchor="start">I didn&#39;t write the test. The gate explored the reachable states, found the hole, and handed back the shortest sequence that reaches it.</text><text x="74" y="611" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#0b1220" font-weight="400" text-anchor="start">Point the same check at the clean build</text><text x="466.7" y="611" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#15803d" font-weight="700" text-anchor="start">→  it passes.  ✓</text></svg>