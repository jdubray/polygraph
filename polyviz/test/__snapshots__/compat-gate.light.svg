<svg xmlns="http://www.w3.org/2000/svg" width="760" height="759" viewBox="0 0 760 759"><rect width="760" height="759" fill="#ffffff"/><rect x="0" y="0" width="760" height="6" fill="#15803d"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#15803d" font-weight="700" text-anchor="start" letter-spacing="3">THE HARD PART</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#0b1220" font-weight="700" text-anchor="start">State outlives its code</text><text x="48" y="128" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#5b6b82" font-weight="400" text-anchor="start">The bug isn&#39;t in the new code. It&#39;s in the state the old code already left behind.</text><text x="48" y="729" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#5b6b82" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="712" y="729" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5b6b82" font-style="italic" text-anchor="end">verify, don&#39;t review</text><rect x="48" y="182" width="300" height="64" rx="12" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="1.8"/><text x="72" y="212" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#d3dbe8" font-weight="700" text-anchor="start">RULE v1</text><text x="72" y="234" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#0b1220" font-weight="700" text-anchor="start">2 approvers</text><line x1="360" y1="214" x2="400" y2="214" stroke="#5b6b82" stroke-width="2.4" stroke-linecap="round"/><polygon points="400,214 391,219.4 391,208.6" fill="#5b6b82"></polygon><rect x="412" y="182" width="300" height="64" rx="12" fill="#f4f6fb" stroke="#4f46e5" stroke-width="1.8"/><text x="436" y="212" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#4f46e5" font-weight="700" text-anchor="start">RULE v2  (deploy)</text><text x="436" y="234" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#0b1220" font-weight="700" text-anchor="start">3 approvers</text><rect x="48" y="286" width="664" height="150" rx="14" fill="#eef1f7" stroke="#d3dbe8" stroke-width="1.5"/><text x="74" y="320" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#0284c7" font-weight="700" text-anchor="start" letter-spacing="1">LIVE FLEET — orders already in flight</text><rect x="74" y="340" width="192" height="72" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="1.5"/><text x="90" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#5b6b82" font-weight="700" text-anchor="start">#o1</text><text x="136" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#5b6b82" font-weight="700" text-anchor="start">EXECUTED</text><text x="90" y="392" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6b82" font-weight="400" text-anchor="start">done</text><rect x="284" y="340" width="192" height="72" rx="10" fill="#f4f6fb" stroke="#b45309" stroke-width="2"/><text x="300" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#5b6b82" font-weight="700" text-anchor="start">#o2</text><text x="346" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#b45309" font-weight="700" text-anchor="start">APPROVED</text><text x="300" y="392" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6b82" font-weight="400" text-anchor="start">2 approvals, under v1</text><rect x="494" y="340" width="192" height="72" rx="10" fill="#f4f6fb" stroke="#d3dbe8" stroke-width="1.5"/><text x="510" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#5b6b82" font-weight="700" text-anchor="start">#o3</text><text x="556" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#5b6b82" font-weight="700" text-anchor="start">PENDING</text><text x="510" y="392" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6b82" font-weight="400" text-anchor="start">1 approval</text><line x1="380" y1="436" x2="380" y2="466" stroke="#d3dbe8" stroke-width="2" stroke-linecap="round"/><polygon points="380,466 374.6,457 385.4,457" fill="#d3dbe8"></polygon><rect x="48" y="470" width="664" height="60" rx="12" fill="#f4f6fb" stroke="#4f46e5" stroke-width="1.8"/><text x="380" y="506" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="16" fill="#4f46e5" font-weight="700" text-anchor="middle">polyvers · seed the check with the live states</text><rect x="48" y="562" width="664" height="127" rx="14" fill="#fdecec" stroke="#dc2626" stroke-width="2"/><text x="74" y="604" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#dc2626" font-weight="800" text-anchor="start">✗ DEPLOY BLOCKED</text><text x="74" y="637" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#0b1220" font-weight="400" text-anchor="start">Order #o2 was approved under the 2-rule. v2 would carry it to execute() with only two</text><text x="74" y="661" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#0b1220" font-weight="400" text-anchor="start">approvals — violating the new invariant. Named. Repro attached.</text></svg>