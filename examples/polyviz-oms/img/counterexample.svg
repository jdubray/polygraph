<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="673" viewBox="0 0 1200 673"><rect width="1200" height="673" fill="#0b1220"/><rect x="0" y="0" width="1200" height="6" fill="#4ade80"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="3">THE BUG IT CAUGHT</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#e6edf6" font-weight="700" text-anchor="start">The gate wrote its own reproduction</text><text x="48" y="128" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#93a1b5" font-weight="400" text-anchor="start">I deleted the guard that blocks ship() until the charge succeeds. Then I asked the gate.</text><text x="48" y="643" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#93a1b5" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="643" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#93a1b5" font-style="italic" text-anchor="end">verify, don&#39;t review</text><rect x="48" y="204" width="173" height="58" rx="10" fill="#131c30" stroke="#26344a" stroke-width="2"/><text x="134.5" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#e6edf6" font-weight="700" text-anchor="middle">submit(Alice)</text><line x1="223" y1="233" x2="239" y2="233" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="239,233 230,228 230,238" fill="#93a1b5"></polygon><rect x="243" y="204" width="140" height="58" rx="10" fill="#131c30" stroke="#26344a" stroke-width="2"/><text x="313" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#e6edf6" font-weight="700" text-anchor="middle">ship()</text><line x1="385" y1="233" x2="401" y2="233" stroke="#93a1b5" stroke-width="2.2" stroke-linecap="round"/><polygon points="401,233 392,228 392,238" fill="#93a1b5"></polygon><rect x="405" y="204" width="140" height="58" rx="10" fill="#131c30" stroke="#f87171" stroke-width="2"/><text x="475" y="238.58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#f87171" font-weight="700" text-anchor="middle">deliver()</text><rect x="48" y="314" width="1104" height="103" rx="14" fill="#1c1013" stroke="#f87171" stroke-width="2"/><text x="74" y="356" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#f87171" font-weight="800" text-anchor="start">✗ S1 VIOLATED — delivered without payment</text><text x="74" y="389" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#e6edf6" font-weight="400" text-anchor="start">With the charge guard removed, the gate drove a never-charged order all the way to delivered().</text><rect x="48" y="445" width="1104" height="158" rx="14" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="74" y="489" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#4ade80" font-weight="700" text-anchor="start">This 3-step path was generated by the gate — not by hand.</text><text x="74" y="527" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#93a1b5" font-weight="400" text-anchor="start">The gate explored the reachable states, found the hole, and returned the shortest sequence that reaches it.</text><text x="74" y="567" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#e6edf6" font-weight="400" text-anchor="start">Point the same check at the clean build</text><text x="466.7" y="567" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15.5" fill="#4ade80" font-weight="700" text-anchor="start">→  it passes.  ✓</text></svg>