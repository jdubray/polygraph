<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="488" viewBox="0 0 1200 488"><rect width="1200" height="488" fill="#0b1220"/><rect x="0" y="0" width="1200" height="6" fill="#4ade80"/><text x="48" y="58" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="14" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="3">THE ORDER MACHINE</text><text x="48" y="96" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#e6edf6" font-weight="700" text-anchor="start">The order lifecycle, and what it must never do</text><text x="48" y="458" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="13" fill="#93a1b5" font-weight="700" text-anchor="start" letter-spacing="3">COGNITIVE FAB · POLYGRAPH</text><text x="1152" y="458" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#93a1b5" font-style="italic" text-anchor="end">verify, don&#39;t review</text><rect x="48" y="130" width="1104" height="288" rx="12" fill="#131c30" stroke="#26344a" stroke-width="1.5"/><text x="84" y="168" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="15" fill="#4ade80" font-weight="700" text-anchor="start" letter-spacing="2">3 MUST-NEVERS · 1 LIVENESS</text><text x="84" y="216" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S1</text><text x="140" y="216" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never deliver an order that was never charged</text><text x="84" y="266" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S2</text><text x="140" y="266" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never charge an order twice — exactly once</text><text x="84" y="316" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#4ade80" font-weight="700" text-anchor="start">S3</text><text x="140" y="316" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">Never ship an order that was never charged</text><text x="84" y="366" font-family="&#39;DejaVu Sans Mono&#39;,&#39;Courier New&#39;, monospace" font-size="17" fill="#818cf8" font-weight="700" text-anchor="start">L1</text><text x="140" y="366" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e6edf6" font-weight="400" text-anchor="start">An order stays cancellable until it is charged</text></svg>