<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; } body { margin: 0; }</style>
</helmet>
<div style="font-family: 'Space Grotesk', sans-serif; background: #f6f4ee; color: #1b1d1f; padding: 34px 40px 30px; width: 1040px; margin: 0 auto;">

  <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px;">
    <div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #71757c;">SDLC · fig 1</div>
      <div style="font-size: 27px; font-weight: 600; letter-spacing: -0.01em; margin-top: 4px; white-space: nowrap;">A lifecycle for verified stateful code</div>
    </div>
    <div style="display: flex; gap: 15px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #71757c; padding-bottom: 4px;">
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#1b1d1f;margin-right:5px;"></span>human</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#6a4b9c;margin-right:5px;"></span>agent</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#3f7a54;margin-right:5px;"></span>CI</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#b23b2e;margin-right:5px;"></span>human gate</span>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 340px 1fr; gap: 28px;">
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <sc-for list="{{ phases }}" as="p" hint-placeholder-count="8">
        <div onMouseEnter="{{ p.on }}" style="display: flex; align-items: center; gap: 12px; background: {{ p.bg }}; border: 1px solid {{ p.border }}; border-radius: 9px; padding: 9px 12px; cursor: default; transition: background .15s, border-color .15s;">
          <div style="width: 26px; height: 26px; border-radius: 7px; background: {{ p.numBg }}; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex: none;">{{ p.n }}</div>
          <div style="font-size: 14px; font-weight: {{ p.weight }}; flex: 1;">{{ p.name }}</div>
          <div style="width: 9px; height: 9px; border-radius: 50%; background: {{ p.gateDot }}; flex: none;"></div>
        </div>
      </sc-for>
    </div>

    <div style="background: #fffdf8; border: 1px solid #e4dfcf; border-left: 3px solid {{ dColor }}; border-radius: 13px; padding: 22px 24px; transition: border-color .18s;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #a09a8c;">Phase {{ dNum }}</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; background: {{ dColor }}; border-radius: 5px; padding: 2px 8px;">{{ dOwner }}</div>
      </div>
      <div style="font-size: 22px; font-weight: 600; margin: 8px 0 10px;">{{ dName }}</div>
      <div style="font-family: 'Newsreader', serif; font-size: 16.5px; line-height: 1.5; color: #33373c;">{{ dBody }}</div>
      <div style="margin-top: 16px; display: flex; gap: 10px; align-items: flex-start; background: {{ dGateBg }}; border-radius: 9px; padding: {{ dGatePad }};">
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; background: #b23b2e; border-radius: 5px; padding: 3px 8px; flex: none; display: {{ dGateShow }};">{{ dGateTag }}</div>
        <div style="font-family: 'Newsreader', serif; font-style: italic; font-size: 14.5px; line-height: 1.4; color: #8a3229; display: {{ dGateShow }};">{{ dGateBody }}</div>
      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1040, &quot;height&quot;: 560}}">
class Component extends DCLogic {
  state = { active: 1 };
  go(i){ this.setState({ active: i }); }
  renderVals(){
    const A = this.state.active;
    const owners = { human: '#1b1d1f', agent: '#6a4b9c', ci: '#3f7a54' };
    const phases = [
      { name: 'Decide which door', owner: 'human', color: owners.human, body: 'New feature with nontrivial state → author with polygen (Phase 1). Existing / legacy / third-party stateful code → audit with Polygraph (Phase 4). A verified machine that needs to run durably → polyrun (Phase 3).' },
      { name: 'Specify', owner: 'human', color: owners.human, body: 'Write one paragraph of intent; the agent runs polygen, which drafts contract.json.', gate: ['Gate #1 — review the contract', 'It is now the design spec every downstream check is built against: right observable keys, every action\'s dataDomain populated, terminal states, named specialRules as your reject vocabulary.'] },
      { name: 'Author', owner: 'agent', color: owners.agent, body: 'polygen authors the SAM v2 module, proposes invariants, model-checks its own output, self-repairs violations (code, never invariants), cross-checks domains, and synthesizes a replayed corpus (plus the effect mapper + manifest for polyrun machines).', gate: ['Gate #2 — review the invariants', 'They are the model\'s reading of your intent, not ground truth. Read the verdict literally: NOT converged is not shippable.'] },
      { name: 'Integrate & execute', owner: 'agent', color: owners.agent, body: 'Either call the module from your own handler (never reimplement it) and audit it in Phase 4, or wire it into polyrun — register machine + contract + mapper + invariants, write idempotent effect handlers, then run the check-effects composition gate. This is the layer that closes the double-charge class pre-deploy.' },
      { name: 'Verify against reality', owner: 'agent', color: owners.agent, body: 'Ground truth is code executing. Capture real { pre, action, data, post } traces (instrument in-house code, export the polyrun journal, or build a deterministic harness for foreign code); run controls first, then generate + replay, then findings + counterexamples.', gate: ['Gate #3 — triage findings', 'Spec-errors are LLM misreadings; code-findings are leads; contract-errors mean Phase 1 scoped wrong. A finding against a reference app may be an intent observation, not a defect.'] },
      { name: 'Deploy', owner: 'ci', color: owners.ci, body: 'A mechanical gate, no API key: module loads strict-clean with domain cross-checks; setState round-trips over live snapshots; invariants hold pointwise on live state. Shape changes require a pure, fenced, journaled migrate.cjs. Snapshot durability means no replay-determinism debt.' },
      { name: 'Operate & watch drift', owner: 'ci', color: owners.ci, body: 'Ops console, metrics, journalSince projections; DLQ retry/discard; a poisoned instance is a defect alarm, not noise. Schedule continuous audit — version-aware journal replay — and treat nonzero exit as an incident.' },
      { name: 'Evolve', owner: 'human', color: owners.human, body: 'Change flows through the artifacts in order: intent → contract → invariants → machine → check-effects → deploy gate → migrate. The one rule: invariants move first. Editing the machine to change behavior the invariants don\'t describe reintroduces the gap.' },
    ];
    const p = phases[A];
    return {
      phases: phases.map((ph, i) => ({
        n: i, name: ph.name, on: () => this.go(i),
        weight: i === A ? 600 : 400,
        bg: i === A ? '#fffdf8' : 'transparent',
        border: i === A ? '#e4dfcf' : 'transparent',
        numBg: ph.color,
        gateDot: ph.gate ? '#b23b2e' : 'transparent',
      })),
      dNum: A, dName: p.name, dBody: p.body, dColor: p.color, dOwner: p.owner,
      dGateShow: p.gate ? 'block' : 'none',
      dGateBg: p.gate ? '#f7ecea' : 'transparent',
      dGatePad: p.gate ? '11px 13px' : '0',
      dGateTag: p.gate ? p.gate[0] : '', dGateBody: p.gate ? p.gate[1] : '',
    };
  }
}
</script>
</body>
</html>
